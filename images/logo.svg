<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect width="200" height="200" fill="#08090D" rx="24"/>

  <!-- Abstract mark: interlocking bold angular "C" shapes suggesting connection/collaboration -->
  <!-- Two bracket shapes, offset, forming a linked pair -->

  <!-- Left bracket (big outer C) -->
  <path d="M 108 44 L 80 44 Q 60 44 60 64 L 60 124 Q 60 144 80 144 L 108 144"
        fill="none" stroke="#CAFF33" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right bracket (inner reverse C — lighter) -->
  <path d="M 96 62 L 116 62 Q 130 62 130 76 L 130 112 Q 130 126 116 126 L 96 126"
        fill="none" stroke="#CAFF33" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" opacity="0.45"/>

  <!-- Connecting link dots -->
  <circle cx="108" cy="94" r="5" fill="#CAFF33"/>

  <!-- COLLABERA wordmark -->
  <text x="100" y="166"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="12.5"
        font-weight="700"
        fill="#FFFFFF"
        text-anchor="middle"
        letter-spacing="2.5">COLLABERA</text>

  <!-- INTERNATIONAL sub-label -->
  <text x="100" y="181"
        font-family="Arial, Helvetica, sans-serif"
        font-size="6.5"
        font-weight="400"
        fill="#CAFF33"
        text-anchor="middle"
        letter-spacing="3.5">INTERNATIONAL</text>
</svg>
