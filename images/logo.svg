<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect width="200" height="200" fill="#08090D" rx="24"/>

  <!-- Geometric C-mark: two bold offset C arcs forming a layered mark -->
  <!-- Outer C -->
  <path d="M110 44
             A42 42 0 1 0 110 156
             L110 142
             A28 28 0 1 1 110 58
             Z"
        fill="#CAFF33"/>

  <!-- Inner accent slit — vertical bar suggesting a building column -->
  <rect x="97" y="82" width="10" height="36" rx="2" fill="#08090D"/>

  <!-- Small dot accent below icon -->
  <circle cx="100" cy="168" r="3" fill="#CAFF33"/>

  <!-- COLLABERA text -->
  <text x="100" y="186"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="13"
        font-weight="700"
        fill="#FFFFFF"
        text-anchor="middle"
        letter-spacing="3">COLLABERA</text>
</svg>
